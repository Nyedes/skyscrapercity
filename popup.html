<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Skyscraper City Forum Opener</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 4px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .header-logo {
            font-size: 20px;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Primary Button */
        #openAllUnread {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
        }

        #openAllUnread:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.45);
            filter: brightness(1.1);
        }

        #openAllUnread:active:not(:disabled) {
            transform: translateY(0);
        }

        #openAllUnread:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Secondary Button */
        #addRuleForPage {
            background: rgba(30, 41, 59, 0.6);
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        #addRuleForPage:hover:not(:disabled) {
            background: rgba(51, 65, 85, 0.8);
            border-color: #64748b;
            color: #ffffff;
            transform: translateY(-1px);
        }

        #addRuleForPage:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Status Display Pill */
        #status {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
            transition: all 0.3s ease;
        }

        #status.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            color: #93c5fd;
        }

        #status.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #a7f3d0;
            animation: pulse-success 1.5s infinite alternate;
        }

        #status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        /* Pulsing keyframes for Scanning status */
        @keyframes pulse-success {
            0% { box-shadow: 0 0 4px rgba(16, 185, 129, 0.1); }
            100% { box-shadow: 0 0 12px rgba(16, 185, 129, 0.3); }
        }

        .options-link-container {
            text-align: center;
            margin-top: 4px;
        }

        .options-link {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s ease, border-bottom 0.2s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .options-link:hover {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }
    </style>
    <script src="popup.js"></script>
</head>
<body>
    <div class="header">
        <span class="header-logo">🏙️</span>
        <h1>Skyscraper City Opener</h1>
    </div>
    
    <button id="openAllUnread">
        <span>⚡</span> Open Unread Links
    </button>
    
    <div id="status" class="info">Initializing...</div>
    
    <button id="addRuleForPage">
        <span>⚙️</span> Edit Rules for Page
    </button>
    
    <div class="options-link-container">
        <a class="options-link" href="options.html" target="_blank">
            Configure All Rules →
        </a>
    </div>
</body>
</html>
